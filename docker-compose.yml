services:
  
  postgres:
  # Tells Docker to pull the official PostgreSQL image from Docker Hub
    image: postgres:16-alpine
    # A friendly name for the container. 
    container_name: rag-postgres
    environment:
    # PostgreSQL reads these on first startup to create the database and user
      - POSTGRES_DB=rag_db
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_password
      - POSTGRES_HOST_AUTH_METHOD=password
      - PGDATA=/var/lib/postgresql/data/pgdata
      # Format is always host:container. 
      # Left side is your Mac, right side is inside the container. So localhost:5432 on your machine reaches PostgreSQL inside the container.
    ports:
      - "5432:5432"
      # Without this, all data is wiped when the container stops. postgres_data is a named volume Docker manages, 
      # mapped to where PostgreSQL stores its files inside the container.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    networks:
      - rag-network
    # Docker runs pg_isready every 5 seconds to check if PostgreSQL is actually ready to accept connections. Other services that depends_on postgres will wait until this passes before starting.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    
    restart: unless-stopped
  

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: rag-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
      - "9600:9600"
      # This is an OS-level setting. memlock controls how much memory a process can lock in RAM. -1 means unlimited. This is required because we set bootstrap.memory_lock=true above — without this OpenSearch would fail to start.
      # soft — the default limit, can be changed by the process itself
      # hard — the absolute maximum, only root can change it
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - rag-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: rag-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    # This tells Docker "don't start opensearch-dashboards until opensearch is running". 
    depends_on:
      - opensearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rag-network

  airflow:
      build: 
        context: ./airflow
        dockerfile: Dockerfile
      container_name: rag-airflow
      depends_on:
        postgres:
          condition: service_healthy
      environment:
        - AIRFLOW_HOME=/opt/airflow
        - PYTHONPATH=/opt/airflow/src
        - POSTGRES_DATABASE_URL=postgresql+psycopg2://rag_user:rag_password@postgres:5432/rag_db
        - OPENSEARCH_HOST=http://opensearch:9200
        - REDIS__HOST=redis
      volumes:
        - ./airflow/dags:/opt/airflow/dags
        - airflow_logs:/opt/airflow/logs
        - ./airflow/plugins:/opt/airflow/plugins
        - ./src:/opt/airflow/src
        - ./data:/opt/airflow/data
      ports:
        - "8080:8080"
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 120s
      networks:
        - rag-network

  api:
      build: .
      container_name: rag-api
      ports:
        - "8000:8000"
      depends_on:
        postgres:
          condition: service_healthy
        opensearch:
          condition: service_healthy
        redis:
          condition: service_healthy
      healthcheck:
        test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s
      env_file:
        - .env
      environment:
        - OPENSEARCH_HOST=http://opensearch:9200
        - POSTGRES_DATABASE_URL=postgresql+psycopg2://rag_user:rag_password@postgres:5432/rag_db
        - REDIS__HOST=redis
      networks:
        - rag-network

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  airflow_logs:

networks:
  rag-network:
    driver: bridge



    


